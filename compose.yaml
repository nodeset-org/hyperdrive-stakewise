include:
  - $ELCLIENT.yaml
  - $CLCLIENT.yaml

services:
  stakewise:
    image: "europe-west4-docker.pkg.dev/stakewiselabs/public/v3-operator:master"
    container_name: v3-operator
    command:
      src/main.py start
      --vault=$VAULT
      --consensus-endpoints=http://$CLCLIENT:$CLPORT
      --execution-endpoints=http://$ELCLIENT:$ELPORT
    volumes:
      - ./stakewise-data:/data
    environment:
      DATA_DIR: /data
  ethdo:
    image: "wealdtech/ethdo"
