services:
  stakewise:
    image: "europe-west4-docker.pkg.dev/stakewiselabs/public/v3-operator:master"
    container_name: v3-operator
    volumes:
      - "$DATA_DIR/stakewise-data:/data"
    environment:
      DATA_DIR: /data
    env_file: "$DATA_DIR/nodeset.env"
    depends_on:
      - $ECNAME
      - $CCNAME
  ethdo:
    image: "wealdtech/ethdo"
    env_file: "$DATA_DIR/nodeset.env"